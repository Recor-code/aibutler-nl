<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AIbutler — Jouw digitale butler. Niet zomaar een chatbot.</title>
<meta name="description" content="AIbutler is een autonome AI-agent die denkt, plant en handelt in jouw naam. 24/7 in dienst — in de apps die je al gebruikt." />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..700,30..100;1,9..144,300..700,30..100&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components/logo.jsx"></script>
<script type="text/babel" src="components/nav.jsx"></script>
<script type="text/babel" src="components/hero.jsx"></script>
<script type="text/babel" src="components/architecture.jsx"></script>
<script type="text/babel" src="components/features.jsx"></script>
<script type="text/babel" src="components/usecases.jsx"></script>
<script type="text/babel" src="components/demo.jsx"></script>
<script type="text/babel" src="components/compare.jsx"></script>
<script type="text/babel" src="components/testimonial.jsx"></script>
<script type="text/babel" src="components/final.jsx"></script>

<script type="text/babel">
  const App = () => (
    <>
      <Nav />
      <Hero />
      <Architecture />
      <Features />
      <UseCases />
      <Demo />
      <Compare />
      <Testimonial />
      <Waitlist />
      <FAQ />
      <Footer />
    </>
  );

  // Reveal on scroll
  window.addEventListener("load", () => {
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => e.isIntersecting && e.target.classList.add("in"));
    }, { threshold: 0.1 });
    document.querySelectorAll(".reveal").forEach(el => io.observe(el));
  });

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
